plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.4'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.openai'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

ext {
    set('springAiVersion', "2.0.0-M3")
    set('zhipualAiVersion', "1.0.0")
    set('stabilityAiVersion', "1.0.0")
}

bootRun {
    mainClass = 'com.imagegeneration.Main'
}

dependencies {
    implementation project(':shared-lib')
    implementation 'org.springframework.boot:spring-boot-starter'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-autoconfigure'
    implementation "org.springframework.ai:spring-ai-starter-model-stability-ai:${stabilityAiVersion}"
    implementation "org.springframework.ai:spring-ai-starter-model-zhipuai:${zhipualAiVersion}"
    implementation "org.springframework.ai:spring-ai-starter-model-openai:${springAiVersion}"
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.ai:spring-ai-bom:${springAiVersion}"
    }
}

tasks.test {
    useJUnitPlatform()
}